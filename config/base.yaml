# =============================================================================
# AegisRAG - Base Configuration
# Grounded Customer-Support RAG Copilot
# =============================================================================

# ---------------------------------------------------------------------------
# Model Paths
# ---------------------------------------------------------------------------
models:
  retriever:
    name: "BAAI/bge-m3"
    embedding_dim: 1024
    max_seq_length: 8192
    normalize_embeddings: true
    pooling_method: "cls"

  reranker:
    name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    max_seq_length: 512   # MiniLM-L-6 hard limit; 8192 was wrong and wasted padding
    max_query_length: 128

  generator:
    name: "Qwen/Qwen2.5-7B-Instruct"
    max_new_tokens: 400   # enough for 5-6 sentence answers without excessive latency
    temperature: 0.3
    top_p: 0.9
    top_k: 50
    repetition_penalty: 1.1
    do_sample: true
    gguf_path: "checkpoints/aegis_base.gguf"
    gguf_n_ctx: 4096
    gguf_n_gpu_layers: 0  # 0 = CPU only (MPS Metal crashes with quantized attention shapes)

  nli:
    name: "cross-encoder/nli-MiniLM2-L6-H768"
    max_seq_length: 256

  decomposer:
    name: "Qwen/Qwen2.5-7B-Instruct" # shares weights with generator
    max_new_tokens: 256
    temperature: 0.2

# ---------------------------------------------------------------------------
# Retrieval Settings
# ---------------------------------------------------------------------------
retrieval:
  top_k: 10          # was 20; halves reranker work with negligible recall drop
  rerank_top_k: 5
  chunk_size: 256
  chunk_overlap: 96
  min_chunk_size: 30
  bm25_k1: 1.5
  bm25_b: 0.75
  bm25_epsilon: 0.25
  initial_alpha: 0.5 # dense weight in hybrid fusion (1-alpha = BM25 weight)
  alpha_min: 0.1
  alpha_max: 0.9
  similarity_metric: "cosine"
  dedup_threshold: 0.92 # MinHash near-dup threshold during ingestion

# ---------------------------------------------------------------------------
# CGAL (Confidence-Gated Action Loop) Settings
# ---------------------------------------------------------------------------
cgal:
  max_iterations: 2   # was 3; 3rd iteration almost never improves quality but triples worst-case latency
  high_confidence: 0.35   # head outputs 0.24-0.34; above this = answer without verify
  medium_confidence: 0.22  # above this = answer with verify; covers full observed range
  low_confidence: 0.10     # below this = escalate immediately; else retry
  # below low_confidence: escalate / return "I don't know"
  verify_low: 0.50         # lowered: NLI entailment threshold
  verify_high: 0.65        # lowered: high-confidence NLI accept
  escalation_message: "I'm not confident enough to answer this accurately. Let me connect you with a human agent."
  enable_query_decomposition: true
  decomposition_threshold: 0.35 # lowered to match new scale

# ---------------------------------------------------------------------------
# Training Settings
# ---------------------------------------------------------------------------
training:
  seed: 42
  output_base_dir: "checkpoints"
  logging_steps: 50
  save_strategy: "steps"
  save_steps: 500
  eval_strategy: "steps"
  eval_steps: 500
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  fp16: true
  bf16: false
  gradient_checkpointing: true
  dataloader_num_workers: 4
  report_to: "none"

  retriever:
    learning_rate: 2.0e-5
    num_epochs: 3
    batch_size: 32
    warmup_ratio: 0.1
    weight_decay: 0.01
    max_grad_norm: 1.0
    negatives_per_query: 7
    hard_negative_mining: true
    in_batch_negatives: true
    loss: "infonce" # infonce | triplet_margin
    triplet_margin: 0.2
    temperature: 0.05
    output_dir: "checkpoints/retriever"

  reranker:
    learning_rate: 1.0e-5
    num_epochs: 3
    batch_size: 16
    warmup_ratio: 0.1
    weight_decay: 0.01
    max_grad_norm: 1.0
    max_seq_length: 512
    loss: "cross_entropy"
    label_smoothing: 0.1
    output_dir: "checkpoints/reranker"

  generator_sft:
    learning_rate: 2.0e-4
    num_epochs: 3
    batch_size: 4
    gradient_accumulation_steps: 8
    warmup_ratio: 0.03
    weight_decay: 0.01
    max_grad_norm: 1.0
    max_seq_length: 2048
    packing: false
    output_dir: "checkpoints/generator_sft"

  dpo:
    learning_rate: 5.0e-6
    num_epochs: 1
    batch_size: 1
    gradient_accumulation_steps: 8
    warmup_ratio: 0.1
    weight_decay: 0.01
    max_grad_norm: 1.0
    beta: 0.1 # DPO KL penalty coefficient
    max_seq_length: 1536
    max_prompt_length: 768
    loss_type: "ipo" # ipo is more stable on tiny datasets
    # Trainer filters preferences to these rejection types only:
    preference_types:
      - "hallucinated_citation"
      - "no_citation"
    output_dir: "checkpoints/dpo"

  confidence_head:
    learning_rate: 1.0e-3
    num_epochs: 10
    batch_size: 64
    warmup_ratio: 0.05
    weight_decay: 1.0e-4
    max_grad_norm: 1.0
    hidden_dim: 256
    dropout: 0.1
    label_smoothing: 0.05 # soft-label smoothing
    loss: "kl_divergence" # kl_divergence | mse | bce
    calibration_method: "temperature_scaling"
    calibration_bins: 15
    output_dir: "checkpoints/confidence_head"

  alpha_network:
    learning_rate: 1.0e-3
    num_epochs: 15
    batch_size: 128
    warmup_ratio: 0.1
    weight_decay: 1.0e-4
    max_grad_norm: 1.0
    hidden_dim: 128
    dropout: 0.1
    loss: "mse"
    output_dir: "checkpoints/alpha_network"

  decomposer:
    learning_rate: 2.0e-4
    num_epochs: 2
    batch_size: 4
    gradient_accumulation_steps: 8
    warmup_ratio: 0.03
    weight_decay: 0.01
    max_grad_norm: 1.0
    max_seq_length: 1024
    output_dir: "checkpoints/decomposer"

# ---------------------------------------------------------------------------
# Quantization Settings (QLoRA / bitsandbytes)
# ---------------------------------------------------------------------------
quantization:
  load_in_4bit: true
  load_in_8bit: false
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_use_double_quant: true

# ---------------------------------------------------------------------------
# LoRA / DoRA Settings (shared defaults; overridable per component)
# ---------------------------------------------------------------------------
lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  use_dora: true
  bias: "none"
  task_type: "CAUSAL_LM"
  modules_to_save: null

# ---------------------------------------------------------------------------
# Serving Settings
# ---------------------------------------------------------------------------
serving:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  sse_heartbeat_interval: 15 # seconds
  request_timeout: 120 # seconds
  max_concurrent_requests: 10
  cors_origins:
    - "*"
  api_prefix: "/api/v1"

# ---------------------------------------------------------------------------
# Device Settings
# ---------------------------------------------------------------------------
device:
  preferred_device: "auto" # auto | cpu | cuda | mps
  gpu_memory_utilization: 0.85

# ---------------------------------------------------------------------------
# Data / Storage Settings
# ---------------------------------------------------------------------------
data:
  vector_db_path: "data/vectordb"
  bm25_index_path: "data/bm25_index.pkl"
  audit_db_path: "data/audit.db"
  raw_docs_dir: "data/raw_docs"
  processed_dir: "data/processed"
  synthetic_dir: "data/synthetic"
  supported_extensions:
    - ".pdf"
    - ".docx"
    - ".txt"
    - ".md"
    - ".csv"
    - ".json"

# ---------------------------------------------------------------------------
# Evaluation Settings
# ---------------------------------------------------------------------------
evaluation:
  metrics:
    - "answer_relevance"
    - "faithfulness"
    - "context_precision"
    - "context_recall"
    - "bertscore_f1"
    - "latency_p50"
    - "latency_p95"
    - "confidence_ece" # expected calibration error
    - "confidence_auroc"
  bertscore_model: "microsoft/deberta-xlarge-mnli"
  num_bootstrap_samples: 1000

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level:<8} | {name}:{function}:{line} - {message}"
  rotation: "100 MB"
  retention: "30 days"
  log_dir: "logs"
